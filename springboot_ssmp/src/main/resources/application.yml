spring:
  thymeleaf:
    suffix: .html
    mode: HTML
    prefix: classpath:/templates/
    encoding: UTF-8
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/test
      username: root
      password:
  profiles:
    active: dev

